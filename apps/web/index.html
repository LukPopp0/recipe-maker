<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>recipe-maker</title>
    <script>
      // Apply the saved theme before first paint so a stored choice does not
      // flash the OS-preferred colors. Kept inline and dependency-free.
      (function () {
        try {
          var theme = localStorage.getItem('theme');
          if (theme === 'light' || theme === 'dark') {
            document.documentElement.dataset.theme = theme;
          }
        } catch (e) {
          // localStorage unavailable (e.g. privacy mode) - fall back to OS preference.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
